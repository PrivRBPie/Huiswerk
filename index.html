<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Staartdeling Avontuur</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="bubble bubble-1" aria-hidden="true"></div>
      <div class="bubble bubble-2" aria-hidden="true"></div>
      <div class="bubble bubble-3" aria-hidden="true"></div>
      <header class="card topbar sea">
        <div>
          <p class="eyebrow">🌊 Onderwater Rekenmissie</p>
          <h1>Staartdeling Avontuur</h1>
          <p class="subtitle">Speels oefenen met klassieke staartdelingen</p>
        </div>
        <button id="new-problem" class="primary">Nieuwe som</button>
      </header>

      <section class="card controls">
        <label>
          Rekenniveau
          <select id="difficulty">
            <option value="easy">Beginner (2-3 cijfers, deler 2-9)</option>
            <option value="medium" selected>Gemiddeld (3 cijfers, soms rest)</option>
            <option value="hard">Gevorderd (3-4 cijfers, meer rest)</option>
          </select>
        </label>

        <label>
          Begeleiding
          <select id="guidance">
            <option value="1">Niveau 1 - sterk begeleid</option>
            <option value="2" selected>Niveau 2 - gedeeltelijk begeleid</option>
            <option value="3">Niveau 3 - bijna zelfstandig</option>
            <option value="4">Niveau 4 - vrij invullen</option>
          </select>
        </label>
      </section>

      <section class="card board retro" aria-live="polite">
        <div class="mascot">🐠</div>
        <p class="coach">Snork zegt: stap voor stap!</p>

        <div class="classic-division" aria-label="Klassieke staartdeling-opstelling">
          <table id="division-sheet" class="division-sheet"></table>
        </div>

        <div class="division-layout">
          <div class="divisor" id="divisor">4</div>
          <div class="bar"></div>
          <div class="dividend" id="dividend">132</div>
          <div class="quotient-right">
            <span id="quotient-right">?</span>
            <input inputmode="numeric" pattern="[0-9]*" id="q-digit" maxlength="1" aria-label="Quotiëntcijfer in de staartdeling" />
          </div>
          <div class="under-dividend">
            <input inputmode="numeric" pattern="[0-9]*" id="product" maxlength="4" aria-label="Tussenproduct onder het deelcijfer" />
          </div>
        </div>

        <div id="step-prompt" class="prompt"></div>

        <div class="inputs">
          <label>
            Aftrekking (rest van deze stap)
            <input inputmode="numeric" pattern="[0-9]*" id="remainder-step" maxlength="4" />
          </label>
          <label>
            Cijfer naar beneden halen
            <input inputmode="numeric" pattern="[0-9]*" id="bring-down" maxlength="1" />
          </label>
        </div>

        <div class="actions">
          <button id="check-step" class="primary">Controleer rij</button>
          <button id="hint" class="ghost">Hint</button>
        </div>

        <p id="feedback" class="feedback"></p>
        <p id="progress" class="progress"></p>
      </section>

      <section class="card keypad" aria-label="Numeriek toetsenbord voor mobiel">
        <p class="keypad-title">🔢 Sneltoetsen</p>
        <div class="keys" id="keys"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
